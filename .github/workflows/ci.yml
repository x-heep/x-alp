  lint:
    name: Lint Generated Files
    runs-on: ubuntu-latest
    needs: determine-image-tag
    container:
      image: ghcr.io/x-heep/x-heep/x-heep-toolchain:${{ needs.determine-image-tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Project
        uses: ./.github/actions/setup-project
      - name: Mark Repository as Safe
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Check generated file consistency
        shell: bash -le {0}
        run: |
          export RISCV_XALP=$RISCV_XHEEP && \
          export COMPILER_PREFIX=riscv32-corev- && \
          make mcu-gen && \
          util/git-diff.py --error-msg '::error ::Found differences in generated SystemVerilog files.'

