name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

permissions:
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  determine-image-tag:
    name: Determine Image Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the full history to get the tag
          fetch-tags: true

      - name: Determine tag
        id: get-tag
        run: |
          UPSTREAM_URL=$(git remote get-url upstream 2>/dev/null || echo "https://github.com/x-heep/x-alp.git")
          git fetch --tags "$UPSTREAM_URL"
          TAG_NAME=$(git describe --tags --abbrev=0 --match "v*" 2> /dev/null || echo "")
          if [ -z "$TAG_NAME" ]; then
            echo "No tag in branch history, getting latest tag from main"
            TAG_NAME=$(git describe --tags --abbrev=0 --match "v*" origin/main 2> /dev/null || echo "")
          fi
          if [ -z "$TAG_NAME" ]; then
            echo "No tags found, defaulting to 'latest'"
            TAG_NAME="latest"
          fi
          echo "Detected tag: $TAG_NAME"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

  compile-apps:
    name: Compile All Apps
    runs-on: ubuntu-latest
    needs: [determine-image-tag, lint, check-vendor]
    container:
      image: ghcr.io/x-heep/x-heep/x-heep-toolchain:${{ needs.determine-image-tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Project
        uses: ./.github/actions/setup-project
      - name: Compile all apps with GCC and Clang
        shell: bash -le {0}
        run: |
          export RISCV_XALP=$RISCV_XHEEP && \
          export COMPILER_PREFIX=riscv32-corev- && \
          make mcu-gen && \
          python3 test/test_apps/test_apps.py --compilers gcc --compiler-paths /tools/riscv --compiler-prefixes riscv32-corev- --table --compile-only

  simulate-apps:
    name: Simulate All Apps
    runs-on: ubuntu-latest
    needs: [determine-image-tag, lint, check-vendor]
    container:
      image: ghcr.io/x-heep/x-heep/x-heep-toolchain:${{ needs.determine-image-tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Project
        uses: ./.github/actions/setup-project
      - name: Compile and simulate all apps
        shell: bash -le {0}
        run: |
          export RISCV_XALP=$RISCV_XHEEP && \
          export COMPILER_PREFIX=riscv32-corev- && \         
          make mcu-gen && \
          python3 test/test_apps/test_apps.py --compilers gcc --compiler-paths /tools/riscv --compiler-prefixes riscv32-corev- --table

